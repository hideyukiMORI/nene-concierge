<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeNe Concierge — 管理画面</title>
  <link rel="stylesheet" href="/admin/app.css" />
  <link rel="icon" type="image/svg+xml" href="/admin/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/admin/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/admin/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/admin/apple-touch-icon.png" />
  <style>
    /* ── NeNe Concierge Admin — Design Tokens ──────────────────────────────
       Default Light = :root。テーマは [data-nca-theme='*'] でオーバーライド。
       v2 (2026-05-28): エディタ用に node / glass / minimap トークンを追加
    ──────────────────────────────────────────────────────────────────────── */
    :root {
      /* ── Accent / Primary (teal — Default Light) ──────────────────────── */
      --nca-color-primary:        oklch(62% 0.14 192);
      --nca-color-primary-hover:  oklch(56% 0.14 192);
      --nca-color-primary-light:  oklch(97% 0.03 192);
      --nca-color-primary-border: oklch(74% 0.10 192);
      --nca-color-primary-muted:  oklch(80% 0.08 192);
      --nca-color-primary-text:   oklch(36% 0.14 192);
      --nca-color-primary-bg:     oklch(94% 0.05 192);
      --nca-color-primary-fg:     #fff;
      --nca-color-primary-tint:   oklch(62% 0.14 192 / 0.10);
      --nca-color-primary-ring:   oklch(62% 0.14 192 / 0.35);

      /* ── Danger ───────────────────────────────────────────────────────── */
      --nca-color-danger:         oklch(52% 0.20 25);
      --nca-color-danger-bg:      oklch(97% 0.02 25);
      --nca-color-danger-border:  oklch(78% 0.09 25);
      --nca-color-danger-text:    oklch(37% 0.18 25);
      --nca-color-danger-fg:      oklch(45% 0.20 25);

      /* ── Success ──────────────────────────────────────────────────────── */
      --nca-color-success-bg:     oklch(97% 0.03 145);
      --nca-color-success-border: oklch(78% 0.10 145);
      --nca-color-success-text:   oklch(38% 0.15 145);
      --nca-color-success-fg:     oklch(50% 0.18 145);
      --nca-color-success-pill-bg: oklch(95% 0.07 145 / 0.6);

      /* ── Surface & Background ─────────────────────────────────────────── */
      --nca-color-bg:             oklch(97% 0.006 75);
      --nca-color-surface:        oklch(100% 0 0);
      --nca-color-surface-alt:    oklch(98% 0.005 75);

      /* ── Sidebar (dark — エディタ slim variant でも同色) ───────────────── */
      --nca-color-sidebar:        oklch(19% 0.015 265);
      --nca-color-sidebar-hover:  oklch(24% 0.015 265);
      --nca-color-sidebar-active: oklch(62% 0.14 192 / 0.14);
      --nca-color-sidebar-border: oklch(27% 0.015 265);
      --nca-color-sidebar-text:   oklch(72% 0.010 265);
      --nca-color-sidebar-muted:  oklch(55% 0.010 265);
      --nca-color-sidebar-title:  oklch(94% 0.005 75);

      /* ── Text ─────────────────────────────────────────────────────────── */
      --nca-color-text:           oklch(18% 0.02 75);
      --nca-color-text-strong:    oklch(24% 0.02 75);
      --nca-color-text-muted:     oklch(50% 0.02 75);
      --nca-color-text-faint:     oklch(66% 0.015 75);

      /* ── Border ───────────────────────────────────────────────────────── */
      --nca-color-border:         oklch(88% 0.010 75);
      --nca-color-border-input:   oklch(82% 0.010 75);
      --nca-color-border-light:   oklch(93% 0.006 75);

      /* ── Table ────────────────────────────────────────────────────────── */
      --nca-color-table-header:   oklch(97% 0.006 75);
      --nca-color-table-row:      oklch(99% 0.003 75);
      --nca-color-surface-hover:  oklch(97% 0.005 75);

      /* ── Badge ────────────────────────────────────────────────────────── */
      --nca-badge-draft-bg:       oklch(93% 0.010 265);
      --nca-badge-draft-color:    oklch(34% 0.020 265);
      --nca-badge-pub-bg:         oklch(94% 0.05 145);
      --nca-badge-pub-color:      oklch(36% 0.15 145);
      --nca-badge-arch-bg:        oklch(94% 0.04 25);
      --nca-badge-arch-color:     oklch(36% 0.18 25);

      /* ── Border radius ────────────────────────────────────────────────── */
      --nca-radius-sm:  2px;
      --nca-radius-md:  3px;
      --nca-radius-lg:  4px;
      --nca-radius-xl:  9999px;
      --nca-radius-node: 2px;          /* v2: ノードカード用 */

      /* ── Font size ────────────────────────────────────────────────────── */
      --nca-font-xs:    11px;
      --nca-font-sm:    12px;
      --nca-font-base:  13px;
      --nca-font-md:    14px;
      --nca-font-lg:    16px;
      --nca-font-xl:    18px;
      --nca-font-2xl:   22px;

      /* ── Sidebar width (slim = editor variant) ────────────────────────── */
      --nca-sidebar-width:         240px;
      --nca-sidebar-width-slim:    54px;
      --nca-editor-header-height:  46px;
      --nca-editor-drawer-width:   320px;

      /* ── Shadow ───────────────────────────────────────────────────────── */
      --nca-shadow-card:     0 1px 3px oklch(0% 0 0 / 0.07), 0 1px 2px oklch(0% 0 0 / 0.04);
      --nca-shadow-elevated: 0 10px 30px -10px oklch(0% 0 0 / 0.18), 0 2px 6px oklch(0% 0 0 / 0.06);
      --nca-shadow-focus:    0 0 0 3px oklch(62% 0.14 192 / 0.30);

      /* ── Glass / Dock / Minimap (v2 editor) ───────────────────────────── */
      --nca-glass-bg:        oklch(100% 0 0 / 0.78);
      --nca-glass-dock-bg:   oklch(100% 0 0 / 0.95);
      --nca-minimap-bg:      oklch(88% 0.030 80 / 0.72); /* warm beige */

      /* ── Canvas dot grid (v2 editor) ──────────────────────────────────── */
      --nca-canvas-bg:       oklch(97% 0.008 75);
      --nca-canvas-dot:      oklch(36% 0.020 250 / 0.08);

      /* ── Edge stroke (React Flow connector) ───────────────────────────── */
      --nca-edge-stroke:     oklch(56% 0.020 250 / 0.45);

      /* ── Node tokens (v2 editor) ──────────────────────────────────────── */
      /* Default Light — muted designerly (slate-blue / dijon / dusty violet / warm slate) */
      --nca-node-message-stripe:     #5B7CB8;
      --nca-node-message-body:       #F5F7FB;
      --nca-node-message-edge:       #DDE3EE;
      --nca-node-message-chip:       #EBF0F8;
      --nca-node-message-chip-edge:  #C6D2E5;

      --nca-node-condition-stripe:   #B07432;
      --nca-node-condition-body:     #FBF7EF;
      --nca-node-condition-edge:     #EADDC4;
      --nca-node-condition-chip:     #F4EAD3;
      --nca-node-condition-chip-edge:#DEC79B;

      --nca-node-action-stripe:      #7867AC;
      --nca-node-action-body:        #F7F4FB;
      --nca-node-action-edge:        #E2DCEE;
      --nca-node-action-chip:        #EDE7F6;
      --nca-node-action-chip-edge:   #CFC4E4;

      --nca-node-end-stripe:         #5E6776;
      --nca-node-end-body:           #F5F6F8;
      --nca-node-end-edge:           #DCE0E5;
      --nca-node-end-chip:           #EAECF0;
      --nca-node-end-chip-edge:      #C9CED6;

      /* ── Motion ───────────────────────────────────────────────────────── */
      --nca-transition-fast:   150ms ease;
      --nca-transition-normal: 200ms ease;
    }

    /* ═══════════════════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════════════════ */

      --nca-color-primary:        oklch(80% 0.13 192);

      --nca-color-primary-muted:  oklch(40% 0.10 192);

      --nca-color-primary-bg:     oklch(18% 0.08 192);
      --nca-color-primary-fg:     oklch(13% 0.010 265);

      --nca-color-primary-ring:   oklch(80% 0.13 192 / 0.35);

      --nca-color-sidebar-hover:  oklch(17% 0.015 265);
      --nca-color-sidebar-active: oklch(80% 0.13 192 / 0.16);
      --nca-color-sidebar-border: oklch(22% 0.010 265);

      --nca-color-border:         oklch(28% 0.010 265);
      --nca-color-border-input:   oklch(32% 0.010 265);
      --nca-color-border-light:   oklch(22% 0.010 265);
      --nca-color-table-header:   oklch(13% 0.010 265);
      --nca-color-table-row:      oklch(16% 0.008 265);
      --nca-color-surface-hover:  oklch(18% 0.012 265);
      --nca-badge-draft-bg:       oklch(22% 0.010 265);
      --nca-badge-draft-color:    oklch(70% 0.010 265);
      --nca-badge-pub-bg:         oklch(16% 0.08 145);
      --nca-badge-pub-color:      oklch(66% 0.14 145);
      --nca-badge-arch-bg:        oklch(16% 0.08 25);
      --nca-badge-arch-color:     oklch(66% 0.15 25);
      --nca-shadow-card:          0 1px 3px oklch(0% 0 0 / 0.30);
      --nca-shadow-elevated:      0 12px 32px -10px oklch(0% 0 0 / 0.55), 0 2px 6px oklch(0% 0 0 / 0.40);
      --nca-shadow-focus:         0 0 0 3px oklch(80% 0.13 192 / 0.35);
      --nca-glass-bg:             oklch(17% 0.012 265 / 0.72);
      --nca-glass-dock-bg:        oklch(17% 0.012 265 / 0.85);
      --nca-minimap-bg:           oklch(17% 0.012 265 / 0.55);
      --nca-canvas-bg:            oklch(13% 0.010 265);
      --nca-canvas-dot:           oklch(65% 0.020 250 / 0.10);
      --nca-edge-stroke:          oklch(65% 0.020 250 / 0.45);

      --nca-node-message-stripe:     #60A5FA;
      --nca-node-message-body:       #0F1722;
      --nca-node-message-edge:       #1E2D44;
      --nca-node-message-chip:       rgba(96,165,250,.16);
      --nca-node-message-chip-edge:  rgba(96,165,250,.45);
      --nca-node-condition-stripe:   #FB923C;
      --nca-node-condition-body:     #1A140D;
      --nca-node-condition-edge:     #3A2812;
      --nca-node-condition-chip:     rgba(251,146,60,.16);
      --nca-node-condition-chip-edge:rgba(251,146,60,.45);
      --nca-node-action-stripe:      #A78BFA;
      --nca-node-action-body:        #161227;
      --nca-node-action-edge:        #2D2547;
      --nca-node-action-chip:        rgba(167,139,250,.16);
      --nca-node-action-chip-edge:   rgba(167,139,250,.45);
      --nca-node-end-stripe:         #94A3B8;
      --nca-node-end-body:           #11151B;
      --nca-node-end-edge:           #272E38;
      --nca-node-end-chip:           rgba(148,163,184,.16);
      --nca-node-end-chip-edge:      rgba(148,163,184,.40);
    }

      --nca-node-message-edge:       #34525F;
      --nca-node-message-chip:       rgba(139,233,253,.18);
      --nca-node-message-chip-edge:  rgba(139,233,253,.45);
      --nca-node-condition-stripe:   #ffb86c;
      --nca-node-condition-body:     #3A2E21;
      --nca-node-condition-edge:     #574734;
      --nca-node-condition-chip:     rgba(255,184,108,.18);
      --nca-node-condition-chip-edge:rgba(255,184,108,.45);
      /* action は primary purple と被るので pink #ff79c6 を使用 */
      --nca-node-action-stripe:      #ff79c6;
      --nca-node-action-body:        #3A2435;
      --nca-node-action-edge:        #573951;
      --nca-node-action-chip:        rgba(255,121,198,.18);
      --nca-node-action-chip-edge:   rgba(255,121,198,.45);
      --nca-node-end-stripe:         #6272a4;
      --nca-node-end-body:           #2E3041;
      --nca-node-end-edge:           #44475a;
      --nca-node-end-chip:           rgba(98,114,164,.18);
      --nca-node-end-chip-edge:      rgba(98,114,164,.45);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       Monokai (dark only)
    ═══════════════════════════════════════════════════════════════════════ */
    [data-nca-theme='monokai-dark'] {
      --nca-color-primary:        #a6e22e;
      --nca-color-primary-hover:  #b8e84e;
      --nca-color-primary-light:  oklch(20% 0.08 130);
      --nca-color-primary-border: oklch(38% 0.14 130);
      --nca-color-primary-muted:  oklch(44% 0.13 130);
      --nca-color-primary-text:   #a6e22e;
      --nca-color-primary-bg:     oklch(18% 0.08 130);
      --nca-color-primary-fg:     #272822;
      --nca-color-primary-tint:   oklch(85% 0.20 127 / 0.16);
      --nca-color-primary-ring:   oklch(85% 0.20 127 / 0.40);
      --nca-color-danger:         #f92672;
      --nca-color-danger-bg:      oklch(16% 0.08 355);
      --nca-color-danger-border:  oklch(30% 0.13 355);
      --nca-color-danger-text:    #f92672;
      --nca-color-danger-fg:      #f92672;
      --nca-color-success-bg:     oklch(16% 0.10 127);
      --nca-color-success-border: oklch(30% 0.14 127);
      --nca-color-success-text:   #a6e22e;
      --nca-color-success-fg:     #a6e22e;
      --nca-color-success-pill-bg: oklch(85% 0.20 127 / 0.16);
      --nca-color-bg:             #272822;
      --nca-color-surface:        #34352e;
      --nca-color-surface-alt:    #2e2f28;
      --nca-color-sidebar:        #1e1f1a;
      --nca-color-sidebar-hover:  #2d2e26;
      --nca-color-sidebar-active: oklch(85% 0.20 127 / 0.16);
      --nca-color-sidebar-border: #3e3d32;
      --nca-color-sidebar-text:   #75715e;
      --nca-color-sidebar-muted:  #5d5b51;
      --nca-color-sidebar-title:  #f8f8f2;
      --nca-color-text:           #f8f8f2;
      --nca-color-text-strong:    #f8f8f2;
      --nca-color-text-muted:     #a59f85;
      --nca-color-text-faint:     #75715e;
      --nca-color-border:         #49483e;
      --nca-color-border-input:   #5d5b51;
      --nca-color-border-light:   #3a3a32;
      --nca-color-table-header:   #272822;
      --nca-color-table-row:      #2e2f28;
      --nca-color-surface-hover:  #3a3b34;
      --nca-badge-draft-bg:       #34352e;
      --nca-badge-draft-color:    #a59f85;
      --nca-shadow-card:          0 1px 3px oklch(0% 0 0 / 0.40);
      --nca-shadow-elevated:      0 12px 32px -10px oklch(0% 0 0 / 0.55), 0 2px 6px oklch(0% 0 0 / 0.40);
      --nca-shadow-focus:         0 0 0 3px oklch(85% 0.20 127 / 0.35);
      --nca-glass-bg:             oklch(28% 0.015 95 / 0.78);
      --nca-glass-dock-bg:        oklch(30% 0.015 95 / 0.92);
      --nca-minimap-bg:           oklch(30% 0.015 95 / 0.65);
      --nca-canvas-bg:            #272822;
      --nca-canvas-dot:           oklch(48% 0.030 90 / 0.25);
      --nca-edge-stroke:          oklch(60% 0.030 90 / 0.50);

      --nca-node-message-stripe:     #66d9ef;
      --nca-node-message-body:       #1F3038;
      --nca-node-message-edge:       #2E4651;
      --nca-node-message-chip:       rgba(102,217,239,.18);
      --nca-node-message-chip-edge:  rgba(102,217,239,.45);
      --nca-node-condition-stripe:   #fd971f;
      --nca-node-condition-body:     #38291A;
      --nca-node-condition-edge:     #5A3D1F;
      --nca-node-condition-chip:     rgba(253,151,31,.18);
      --nca-node-condition-chip-edge:rgba(253,151,31,.45);
      /* action は primary green と被るので purple #ae81ff を使用 */
      --nca-node-action-stripe:      #ae81ff;
      --nca-node-action-body:        #2C1F3D;
      --nca-node-action-edge:        #412E5E;
      --nca-node-action-chip:        rgba(174,129,255,.18);
      --nca-node-action-chip-edge:   rgba(174,129,255,.45);
      --nca-node-end-stripe:         #75715e;
      --nca-node-end-body:           #2E2D24;
      --nca-node-end-edge:           #49483e;
      --nca-node-end-chip:           rgba(117,113,94,.18);
      --nca-node-end-chip-edge:      rgba(117,113,94,.40);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button, input, select, textarea { font-family: inherit; font-size: inherit; }

    /* Bracket brand mark — terminal cursor blink */
    @keyframes nca-cursor-blink { 50% { opacity: 0; } }
    .nca-brand-cursor { animation: nca-cursor-blink 1.1s steps(1,end) infinite; }
    body {
      font-family: var(--nca-font-body, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif);
      font-size: var(--nca-font-md);
      line-height: 1.6;
      color: var(--nca-color-text);
      background: var(--nca-color-bg);
    }
    #root { min-height: 100vh; }

    :focus-visible { outline: none; box-shadow: var(--nca-shadow-focus); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/admin/app.js"></script>
</body>
</html>
