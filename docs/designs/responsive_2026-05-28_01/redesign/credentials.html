<!DOCTYPE html>
<html lang="ja" data-nca-theme="default-light">
<head>
<meta charset="UTF-8">
<title>Credentials — NeNe Concierge Admin</title>
<link rel="stylesheet" href="_shared.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-active="credentials">
<div class="layout">
  <aside class="sidebar" id="nca-sidebar"></aside>
  <main class="main-content">
    <div class="main-inner" style="max-width: 1100px; margin: 0 auto;">

      <div class="page-head">
        <div>
          <div class="page-title">Action Credentials</div>
          <div class="page-subtitle">4 active · external connections</div>
        </div>
        <button class="btn btn-primary">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
          追加
        </button>
      </div>

      <!-- New credential card (collapsed by default — shown here for design review) -->
      <div class="card" style="margin-bottom: 20px;">
        <div class="section-head">
          <span class="label">new credential</span>
          <span class="rule"></span>
          <button class="btn btn-ghost btn-sm" style="border:none; color: var(--nca-color-text-muted);">✕</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <div class="field">
            <label class="field-label">name <span style="color: var(--nca-color-danger);">*</span></label>
            <input class="field-input" placeholder="例: Slack 通知 webhook">
          </div>
          <div class="field">
            <label class="field-label">adapter</label>
            <select class="field-select">
              <option>HTTP — generic external API</option>
              <option>Email — SMTP</option>
              <option>Slack — incoming webhook</option>
              <option>Chatwork — bot API</option>
            </select>
          </div>
        </div>
        <p class="field-hint" style="margin-top: -4px; margin-bottom: 12px;">
          URL・トークン等の機密設定は作成後、シナリオエディタ側で個別に紐付けます。
        </p>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-primary">作成</button>
          <button class="btn btn-ghost">キャンセル</button>
        </div>
      </div>

      <!-- Credentials table -->
      <div class="card flush">
        <table>
          <thead>
            <tr>
              <th style="width: 44px;">id</th>
              <th>name</th>
              <th style="width: 130px;">adapter</th>
              <th style="width: 140px;" class="mono">created</th>
              <th style="width: 140px;" class="mono">last used</th>
              <th style="width: 90px; text-align: right;"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="id">01</td>
              <td><strong>Slack #cs-notify</strong></td>
              <td><span class="adapter adapter-slack">slack</span></td>
              <td class="mono">04-10</td>
              <td class="mono" style="color: var(--nca-color-success-fg);">3m ago</td>
              <td style="text-align: right;"><button class="btn btn-danger btn-sm">削除</button></td>
            </tr>
            <tr>
              <td class="id">02</td>
              <td><strong>問い合わせ受信メール</strong></td>
              <td><span class="adapter adapter-email">email</span></td>
              <td class="mono">04-15</td>
              <td class="mono" style="color: var(--nca-color-danger-fg);">failed · 1h</td>
              <td style="text-align: right;"><button class="btn btn-danger btn-sm">削除</button></td>
            </tr>
            <tr>
              <td class="id">03</td>
              <td><strong>社内 Webhook (Notion)</strong></td>
              <td><span class="adapter adapter-http">http</span></td>
              <td class="mono">05-01</td>
              <td class="mono">12m ago</td>
              <td style="text-align: right;"><button class="btn btn-danger btn-sm">削除</button></td>
            </tr>
            <tr>
              <td class="id">04</td>
              <td><strong>Chatwork サポートRoom</strong></td>
              <td><span class="adapter adapter-chatwork">chatwork</span></td>
              <td class="mono">05-12</td>
              <td class="mono" style="color: var(--nca-color-text-faint);">—</td>
              <td style="text-align: right;"><button class="btn btn-danger btn-sm">削除</button></td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>
<script src="_sidebar.js"></script>
<script src="_theme-switcher.js"></script>
</body>
</html>
