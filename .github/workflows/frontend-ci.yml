name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # フリート同形（payout ほか）: 全チェックを npm run check 経由で回す。
      # check = type-check → lint（ESLint ゲート・#178）→ test → build。
      - name: Run checks
        working-directory: frontend
        run: npm run check
